# Kubernetes Job to run app inserting rows into a PostgreSQL database
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-insert
  labels:
    app: postgres-insert
spec:
  # Don't retry new Pod on failure
  backoffLimit: 0
  activeDeadlineSeconds: 14400 # Job deadline 4 hours
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: main
          image: registry.redhat.io/ubi9/python-312:latest
          command:
            - /bin/bash
            - -c
            - |
              pip install -r requirements.txt
              python postgres-insert.py
          env:
            - name: DB_HOST
              value: pg-rw.postgres.svc
              # value: pg-rw.postgres-restore.svc
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: adminsecret
            - name: DB_NAME
              value: db1
            - name: BATCH_SIZE
              value: "1"
            - name: BATCH_COUNT
              value: "1200"
            - name: SLEEP_MS
              value: "100"
            - name: MESSAGE_LENGTH
              value: "1000"
          volumeMounts:
            - name: app
              mountPath: /opt/app-root/src

      volumes:
        - name: app
          configMap:
            name: app
