apiVersion: oadp.openshift.io/v1alpha1
kind: DataProtectionApplication
metadata:
  name: gcp
spec:
  backupLocations:
    - name: mysql-oadp
      velero:
        credential:
          key: sa.json
          name: gcp-credentials
        default: true
        objectStorage:
          bucket: my-bucket-n9dps
          prefix: mysql-oadp
        provider: gcp
    - name: cloudnative-pg-oadp
      velero:
        credential:
          key: sa.json
          name: gcp-credentials
        default: false
        objectStorage:
          bucket: my-bucket-n9dps
          prefix: cloudnative-pg-oadp
        provider: gcp
  configuration:
    nodeAgent:
      enable: true
      uploaderType: kopia
    velero:
      args:
        # Default Backup garbage collection is 1h in nano - set 5 mins here for testing
        garbage-collection-frequency: 300000000000
      defaultPlugins:
        - openshift
        - gcp
        - csi
      disableFsBackup: false
  logFormat: text